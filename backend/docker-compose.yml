version: "3.9"

services:
  backend:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - APP_ENV=development
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    command: uvicorn src.app:app --host 0.0.0.0 --port 8000 --reload

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: greenleaf
      POSTGRES_PASSWORD: greenleaf_dev
      POSTGRES_DB: greenleaf_db
    ports:
      - "5435:5432" # Host port 5435 maps to container port 5432
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data:
